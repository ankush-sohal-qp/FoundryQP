# synthetic-data-backend — the app-team's actual deliverable: image + config. Everything else is platform.
# TEMPLATE: filled by new-app.sh. The app-team only ever supplies these few values:
#   APP_NAME, IMAGE, PORT, REPLICAS, CPU_REQUEST, MEM_REQUEST, INGRESS_HOST.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthetic-data-backend
  namespace: synthetic-data-backend
  labels:
    app: synthetic-data-backend
spec:
  replicas: 2                # >=2 in prod (node-level HA + something for HPA to scale)
  selector:
    matchLabels:
      app: synthetic-data-backend
  template:
    metadata:
      labels:
        app: synthetic-data-backend
    spec:
      # Pull secret for private OCIR images. new-app.sh leaves this commented when the image
      # is public; uncomments + fills it when --pull-secret is given (created out-of-band, B-plan).
      imagePullSecrets:
        - name: ocir-secret
      # spread replicas across nodes — a node dies, the app survives
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: synthetic-data-backend
      containers:
        - name: app
          image: bom.ocir.io/bm7gzqslzqdh/synthetic-data:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          # baseline hardening safe for any image: no priv-escalation, drop caps, default seccomp.
          # (runAsNonRoot/readOnlyRootFilesystem need a non-root image rebuild — roadmap.)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: synthetic-data-backend-env       # all config/secrets injected from this Secret
          # readiness: gates traffic — only Ready when the app's own health endpoint passes (incl. DB).
          readinessProbe:
            httpGet:
              path: /synthetic-data/api/health
              port: 3001
            initialDelaySeconds: 30   # higher for DB-dependent apps (boot + DB connect)
            periodSeconds: 10
            failureThreshold: 6
          # liveness: restarts a WEDGED process only — a TCP connect, deliberately NOT the DB health
          # route (a DB outage must not restart-loop every pod).
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 150m           # guaranteed slice — scheduler packs on this
              memory: 256Mi
            limits:
              # NO cpu limit on purpose (trusted internal app): a CPU limit throttles even when the
              # node has idle CPU, hurting bursts + the HPA ramp. The request already guarantees
              # fairness. Keep a CPU limit only for untrusted/multi-tenant workloads.
              memory: 768Mi          # memory limit STAYS — OOM guard (memory is incompressible)
---
apiVersion: v1
kind: Service
metadata:
  name: synthetic-data-backend
  namespace: synthetic-data-backend
  # SERVICE_TYPE=LoadBalancer => these OCI NLB annotations + externalTrafficPolicy: Local apply
  # (direct public NLB, zero-downtime-on-VM-death, like synthetic-data). SERVICE_TYPE=ClusterIP
  # => the annotations are inert and the app is reached via the shared nginx Ingress below.
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
    # let OKE's CCM auto-write the worker-subnet security rules (None => you hand-maintain, error-prone)
    oci-network-load-balancer.oraclecloud.com/security-list-management-mode: "All"
    # NLB health-check: interval MIN is 10000ms (10s) — OCI rejects anything lower. The real
    # zero-downtime-on-VM-death win comes from externalTrafficPolicy: Local below (pod-aware
    # backends), NOT from a fast health-check interval. Keep retries low to evict a dead node sooner.
    oci-network-load-balancer.oraclecloud.com/health-check-interval: "10000"   # ms (NLB minimum)
    oci-network-load-balancer.oraclecloud.com/health-check-timeout: "3000"    # ms
    oci-network-load-balancer.oraclecloud.com/health-check-retries: "2"       # consecutive fails => unhealthy
spec:
  type: LoadBalancer
  selector:
    app: synthetic-data-backend
  # Local => traffic only to nodes running a pod, probes pod readiness (not node-wide :10256) =>
  # near zero-downtime on VM death. new-app.sh sets this only for SERVICE_TYPE=LoadBalancer
  # (it is INVALID on a ClusterIP Service).
  externalTrafficPolicy: Local
  ports:
    - port: 80
      targetPort: 3001
# (SERVICE_TYPE=LoadBalancer — public via OCI NLB directly, no Ingress)

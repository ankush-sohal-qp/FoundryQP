# audience-backend — the app-team's actual deliverable: image + config. Everything else is platform.
# TEMPLATE: filled by new-app.sh. The app-team only ever supplies these few values:
#   APP_NAME, IMAGE, PORT, REPLICAS, CPU_REQUEST, MEM_REQUEST, INGRESS_HOST.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audience-backend
  namespace: audience-backend
  labels:
    app: audience-backend
spec:
  replicas: 3                # >=2 in prod (node-level HA + something for HPA to scale)
  selector:
    matchLabels:
      app: audience-backend
  template:
    metadata:
      labels:
        app: audience-backend
    spec:
      # spread replicas across nodes — a node dies, the app survives
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: audience-backend
      containers:
        - name: app
          image: bom.ocir.io/bmpasgoonhpi/audience:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # baseline hardening safe for any image: no priv-escalation, drop caps, default seccomp.
          # (runAsNonRoot/readOnlyRootFilesystem need a non-root image rebuild — roadmap.)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: audience-backend-env       # all config/secrets injected from this Secret
          # readiness: gates traffic — only Ready when the app's own health endpoint passes (incl. DB).
          readinessProbe:
            httpGet:
              path: /audience-backend/api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 3
            failureThreshold: 2
          # liveness: restarts a WEDGED process only — a TCP connect, deliberately NOT the DB health
          # route (a DB outage must not restart-loop every pod).
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 200m           # guaranteed slice — scheduler packs on this
              memory: 512Mi
            limits:
              # NO cpu limit on purpose (trusted internal app): a CPU limit throttles even when the
              # node has idle CPU, hurting bursts + the HPA ramp. The request already guarantees
              # fairness. Keep a CPU limit only for untrusted/multi-tenant workloads.
              memory: 1536Mi          # memory limit STAYS — OOM guard (memory is incompressible)
---
apiVersion: v1
kind: Service
metadata:
  name: audience-backend
  namespace: audience-backend
spec:
  selector:
    app: audience-backend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audience-backend
  namespace: audience-backend
spec:
  ingressClassName: nginx
  rules:
    - host: audience.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audience-backend
                port:
                  number: 80

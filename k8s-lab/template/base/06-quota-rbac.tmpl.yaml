# Self-service guardrails for {{APP_NAME}}'s namespace.
# ResourceQuota = hard cap (one team can't starve the cluster). LimitRange = per-pod defaults.
# Role + RoleBinding = the team manages THEIR namespace, nothing else.
# TEMPLATE: filled by new-app.sh. {{CPU_REQUEST}}/{{MEM_REQUEST}} come from the app's sizing.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{APP_NAME}}-quota
  namespace: {{APP_NAME}}
spec:
  hard:
    requests.cpu: "{{QUOTA_CPU_REQ}}"        # total CPU this namespace may request
    requests.memory: {{QUOTA_MEM_REQ}}
    limits.memory: {{QUOTA_MEM_LIM}}          # memory is capped (incompressible); CPU intentionally not limited per-pod
    pods: "20"                                # runaway protection
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: {{APP_NAME}}-limits
  namespace: {{APP_NAME}}
spec:
  limits:
    - type: Container
      defaultRequest:                         # if a container sets no request, use the app's sizing
        cpu: {{CPU_REQUEST}}
        memory: {{MEM_REQUEST}}
      default:                                # memory limit default (OOM guard); no default CPU limit
        memory: {{MEM_REQUEST}}
---
# RBAC: a role that can manage workloads INSIDE this namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{APP_NAME}}-developer
  namespace: {{APP_NAME}}
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources:
      ["deployments", "replicasets", "pods", "services", "ingresses",
       "configmaps", "secrets", "jobs", "cronjobs", "statefulsets",
       "persistentvolumeclaims", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Bind that role to the team's group (maps to your SSO/OIDC group in real life).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{APP_NAME}}-team-binding
  namespace: {{APP_NAME}}
subjects:
  - kind: Group
    name: {{TEAM}}                            # whoever is in this group gets developer access, scoped to this ns
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: {{APP_NAME}}-developer
  apiGroup: rbac.authorization.k8s.io

# Namespace — one app-team's isolated "apartment" on the shared platform.
# TEMPLATE: {{APP_NAME}} and {{TEAM}} are filled in by new-app.sh. Never edit the generated copy;
# edit THIS template so every app stays consistent.
apiVersion: v1
kind: Namespace
metadata:
  name: {{APP_NAME}}
  labels:
    team: {{TEAM}}
    tier: backend
    managed-by: platform        # marks this as platform-generated, not hand-rolled

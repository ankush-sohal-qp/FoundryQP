# Self-service guardrails for the team's namespace.
# ResourceQuota = a hard cap on what this team can consume (so one team can't starve the cluster).
# LimitRange = sensible default cpu/mem per pod if the team forgets to set them.
# Role + RoleBinding (RBAC) = the team can manage THEIR namespace, nothing else.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: synthetic-data-quota
  namespace: synthetic-data
spec:
  hard:
    requests.cpu: "2"          # total CPU this namespace may request
    requests.memory: 3Gi
    limits.cpu: "10"           # headroom for HPA 2→6 (6 app pods ×1 core + pg/redis/hog ≈ 7.6 peak)
    limits.memory: 8Gi         # 6 app pods ×768Mi + pg 1Gi + redis/hog ≈ 5.9Gi peak
    pods: "20"                  # max pods — runaway protection
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: synthetic-data-limits
  namespace: synthetic-data
spec:
  limits:
    - type: Container
      default:                 # if a container sets no limit, use this
        cpu: 500m
        memory: 512Mi
      defaultRequest:          # if it sets no request, use this
        cpu: 100m
        memory: 128Mi
---
# RBAC: a role that can manage workloads INSIDE this namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: synthetic-data-developer
  namespace: synthetic-data
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources:
      ["deployments", "replicasets", "pods", "services", "ingresses",
       "configmaps", "secrets", "jobs", "cronjobs", "statefulsets",
       "persistentvolumeclaims", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Bind that role to the team's group/user. (Demo: a placeholder group "synthetic-data-team".)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: synthetic-data-team-binding
  namespace: synthetic-data
subjects:
  - kind: Group
    name: synthetic-data-team          # whoever is in this group gets the developer role, scoped to this ns
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: synthetic-data-developer
  apiGroup: rbac.authorization.k8s.io

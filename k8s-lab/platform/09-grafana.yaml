# Grafana — the dashboard UI. Prometheus is pre-wired as a datasource so it's connected on first open.
# The dashboard is ALSO provisioned from a ConfigMap (not just pushed via API), so it survives pod
# restarts — Grafana's own DB is on ephemeral disk; provisioned files re-load on every start.
#
# PREREQ — admin password comes from a Secret (never hardcoded). Create it before applying:
#   kubectl -n monitoring create secret generic grafana-admin --from-literal=password='<YOUR_PASSWORD>'
# Anonymous auth is enabled below for demo convenience — DISABLE for any real/shared deployment.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus-ds          # FIXED uid — dashboard panels reference this; stays stable across restarts
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
---
# Dashboard PROVIDER: tells Grafana to load any .json found in the mounted dashboards dir on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yml: |
    apiVersion: 1
    providers:
      - name: 'synthetic-data'
        orgId: 1
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin          # kubectl create secret generic grafana-admin --from-literal=password=...
                  key: password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"          # so the demo opens without login friction
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-synthetic   # built from platform/dashboard.json's inner object
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
